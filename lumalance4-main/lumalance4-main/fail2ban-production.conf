[DEFAULT]
# Production fail2ban configuration
# Stricter security rules for production environment

# Ban hosts for one hour:
bantime = 3600
# Retry time window of 10 minutes:
findtime = 600
# Ban after 5 retries:
maxretry = 5
# Logging level
loglevel = INFO

[sshd]
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 5
findtime = 600
bantime = 3600

[nginx-404]
enabled = true
port = http,https
filter = nginx-404
logpath = /var/log/nginx/access.log
maxretry = 10
findtime = 600
bantime = 7200

[nginx-bad-bots]
enabled = true
port = http,https
filter = nginx-bad-bots
logpath = /var/log/nginx/access.log
maxretry = 5
findtime = 600
bantime = 86400

[nginx-botsearch]
enabled = true
port = http,https
filter = nginx-botsearch
logpath = /var/log/nginx/access.log
maxretry = 5
findtime = 600
bantime = 86400 