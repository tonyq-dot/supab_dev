[DEFAULT]
# Development-friendly fail2ban configuration
# Much more lenient rules for development environment

# Ban hosts for only 10 minutes (instead of 1 hour):
bantime = 600
# Retry time window of 30 minutes (instead of 10 minutes):
findtime = 1800
# Ban after 20 retries (instead of 5):
maxretry = 20
# Logging level
loglevel = INFO

[sshd]
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 15
findtime = 1800
bantime = 1800

[nginx-404]
enabled = true
port = http,https
filter = nginx-404
logpath = /var/log/nginx/access.log
maxretry = 50
findtime = 1800
bantime = 1800

[nginx-bad-bots]
enabled = true
port = http,https
filter = nginx-bad-bots
logpath = /var/log/nginx/access.log
maxretry = 30
findtime = 1800
bantime = 3600

[nginx-botsearch]
enabled = true
port = http,https
filter = nginx-botsearch
logpath = /var/log/nginx/access.log
maxretry = 30
findtime = 1800
bantime = 3600 